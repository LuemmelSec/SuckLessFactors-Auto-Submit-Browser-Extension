<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 500px;
      padding: 14px;
      color: #222;
    }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }

    .status-bar {
      padding: 6px 10px;
      border-radius: 5px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status-ok  { background: #d4edda; color: #155724; }
    .status-err { background: #f8d7da; color: #721c24; }

    /* Info bar */
    #info-bar {
      font-size: 11px;
      color: #555;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 6px 10px;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    #info-bar span { font-weight: 600; color: #222; }
    #info-bar .warn { color: #b36a00; font-style: italic; }

    /* Week table */
    table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
    th, td {
      border: 1px solid #ddd; padding: 5px 8px; text-align: left; vertical-align: middle;
    }
    th { background: #f5f5f5; font-weight: 600; font-size: 12px; }
    td:first-child { width: 36px; font-weight: 500; }
    td:nth-child(2) { width: 90px; color: #555; }
    input[type="time"] {
      border: 1px solid #ccc; border-radius: 3px;
      padding: 3px 5px; width: 82px; font-size: 12px;
    }
    .dot {
      display: inline-block;
      width: 10px; height: 10px; border-radius: 50%;
      vertical-align: middle;
    }
    .dot-empty     { background: #ccc; }
    .dot-loaded    { background: #ffc107; }
    .dot-submitted { background: #28a745; }
    .dot-error     { background: #dc3545; }

    /* Action buttons */
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    button.action {
      padding: 6px 13px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 12px; font-weight: 500;
    }
    .btn-load   { background: #6c757d; color: #fff; }
    .btn-retry  { background: #5c6bc0; color: #fff; }
    button:disabled { opacity: 0.45; cursor: default; }

    #log {
      font-size: 11px; color: #555;
      min-height: 18px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Debug panel */
    #debug-panel {
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: 11px;
      padding: 8px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #debug-panel summary {
      cursor: pointer;
      color: #569cd6;
      font-weight: 600;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h2>SuckLessFactors Auto-Submit</h2>

  <div id="status-bar" class="status-bar status-err">
    Not connected — open SuccessFactors timesheet first
  </div>

  <!-- Auto-detected session info -->
  <div id="info-bar">
    <div id="info-text"><span class="warn">Detecting session data…</span></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Day</th>
        <th>Date</th>
        <th>Start</th>
        <th>End</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="times-body"></tbody>
  </table>

  <div class="actions">
    <button id="btn-retry"  class="action btn-retry">↻ Retry connection</button>
    <button id="btn-load"   class="action btn-load">Load from PC</button>
    <button id="btn-submit" class="action btn-submit" disabled>Submit Week</button>
  </div>

  <div id="log"></div>

  <details id="debug-panel">
    <summary>🔧 Debug Info</summary>
    <pre id="debug-output">Loading…</pre>
  </details>

  <script src="popup.js"></script>
</body>
</html>
